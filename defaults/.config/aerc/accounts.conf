[Tino-Proton]
source   = notmuch://~/Mail
outgoing = smtp://tinoheuberger%40protonmail.com@127.0.0.1:1025
outgoing-cred-cmd = bash ~/.scripts/get-pw.sh  ~/.config/mbsync/crypt-store/tino-proton
query-map = ~/.config/aerc/map-tino-proton.conf
notmuch-query = path:tino-proton/**
maildir-store = ~/Mail
maildir-account-path = tino-proton
check-mail = 3m
check-mail-cmd = bash ~/.scripts/mail/sync-mail.sh
check-mail-timeout = 60s
default  = Inbox
from     = Tino Heuberger <tinoheuberger@protonmail.com>
copy-to  = Sent
address-book-cmd = bash ~/.config/aerc/autocomplete.sh %s


